services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgres://vplatform:${DB_PASSWORD:-devpassword}@postgres:5432/vplatform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-not-for-prod
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://localhost:8000/health/'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vplatform
      POSTGRES_USER: vplatform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    command: celery -A config worker -l info --concurrency=2
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgres://vplatform:${DB_PASSWORD:-devpassword}@postgres:5432/vplatform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-not-for-prod
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - quarantine_data:/app/backend/quarantine
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  quarantine_data:
  clamav_db:
